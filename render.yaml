services:
  - type: web
    name: voxpredict-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install --production=false && npx prisma generate
    startCommand: npx tsx src/api/server.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: NODE_OPTIONS
        value: --max-old-space-size=400
